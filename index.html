<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENV MONITOR PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background:#020617;
  color:#e2e8f0;
  font-family:sans-serif;
}

/* GLASS */
.glass {
  background: rgba(15,23,42,0.7);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 15px;
}

/* GLOW */
.glow-green { box-shadow:0 0 15px #00ffcc66; }
.glow-yellow { box-shadow:0 0 15px #ffcc0066; }
.glow-red { box-shadow:0 0 15px #ff3b3b66; }

/* GAUGE TEXT */
.gauge-wrap {
  position:relative;
  height:120px;
}
.gauge-text {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:bold;
}

/* NAV */
.nav button{
  padding:10px;
}
.active{
  color:#38bdf8;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav flex gap-4 p-3 bg-slate-900">
  <button onclick="page('rt')" id="btn-rt" class="active">Realtime</button>
  <button onclick="page('an')" id="btn-an">Analytics</button>
  <button onclick="page('tb')" id="btn-tb">Data</button>
</div>

<!-- REALTIME -->
<div id="rt" class="p-4 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">

<div class="glass text-center">
PM2.5
<div class="gauge-wrap">
<canvas id="g1"></canvas>
<div id="v1" class="gauge-text">0</div>
</div>
</div>

<div class="glass text-center">
PM10
<div class="gauge-wrap">
<canvas id="g2"></canvas>
<div id="v2" class="gauge-text">0</div>
</div>
</div>

<div class="glass text-center">
CO2
<div class="gauge-wrap">
<canvas id="g3"></canvas>
<div id="v3" class="gauge-text">0</div>
</div>
</div>

<div class="glass text-center">
TEMP
<div class="gauge-wrap">
<canvas id="g4"></canvas>
<div id="v4" class="gauge-text">0</div>
</div>
</div>

<div class="glass text-center">
HUMI
<div class="gauge-wrap">
<canvas id="g5"></canvas>
<div id="v5" class="gauge-text">0</div>
</div>
</div>

<div class="glass text-center">
LUX
<div class="gauge-wrap">
<canvas id="g6"></canvas>
<div id="v6" class="gauge-text">0</div>
</div>
</div>

<div class="glass text-center">
NOISE
<div class="gauge-wrap">
<canvas id="g7"></canvas>
<div id="v7" class="gauge-text">0</div>
</div>
</div>

</div>

<!-- GRAPH -->
<div id="an" class="p-4 hidden">
<div class="glass">
<canvas id="chart"></canvas>
</div>
</div>

<!-- TABLE -->
<div id="tb" class="p-4 hidden">
<table id="table" class="w-full text-sm"></table>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxafzEZXrZywZVvVc_9f9Xq6xK-AyORBFnUZL7HmGz6akXzCyTIUposMG2ARokrypOfCTpZcsXydfF/pub?gid=920439731&single=true&output=csv";

/* NAV */
function page(p){
  ["rt","an","tb"].forEach(x=>{
    document.getElementById(x).classList.add("hidden");
    document.getElementById("btn-"+x).classList.remove("active");
  });
  document.getElementById(p).classList.remove("hidden");
  document.getElementById("btn-"+p).classList.add("active");
}

/* GAUGE */
function gauge(id,color){
 return new Chart(document.getElementById(id),{
  type:"doughnut",
  data:{datasets:[{data:[0,100],backgroundColor:[color,"#111"],borderWidth:0}]},
  options:{
    circumference:240,
    rotation:240,
    cutout:"85%",
    animation:{duration:800},
    plugins:{legend:{display:false},tooltip:{enabled:false}}
  }
 });
}

/* INIT */
let g=[
 gauge("g1","#f97316"),
 gauge("g2","#eab308"),
 gauge("g3","#10b981"),
 gauge("g4","#3b82f6"),
 gauge("g5","#06b6d4"),
 gauge("g6","#f59e0b"),
 gauge("g7","#ec4899")
];

/* COLOR LOGIC */
function color(v,max){
 let p=v/max;
 if(p>0.75) return ["#ff3b3b","glow-red"];
 if(p>0.5) return ["#ffcc00","glow-yellow"];
 return ["#00ffcc","glow-green"];
}

/* UPDATE */
function updateGauge(i,val,max){
 let [c,glow]=color(val,max);

 g[i].data.datasets[0].data=[val,Math.max(0,max-val)];
 g[i].data.datasets[0].backgroundColor[0]=c;
 g[i].update();

 let el=document.getElementById("v"+(i+1));
 el.innerText=Math.round(val);
 el.style.color=c;

 let card=el.closest(".glass");
 card.classList.remove("glow-green","glow-yellow","glow-red");
 card.classList.add(glow);
}

/* CSV */
function csv(t){
 let r=t.split("\n").map(x=>x.split(","));
 return r.slice(1);
}

/* GRAPH */
let chart=new Chart(document.getElementById("chart"),{
 type:"line",
 data:{labels:[],datasets:[{data:[],borderColor:"#38bdf8",fill:true}]},
 options:{responsive:true}
});

/* LOAD */
async function load(){
 let res=await fetch(URL);
 let txt=await res.text();
 let d=csv(txt).filter(x=>x.length>5);

 let last=d[d.length-1];

 updateGauge(0,+last[4],100);
 updateGauge(1,+last[5],150);
 updateGauge(2,+last[10],2000);
 updateGauge(3,+last[6],50);
 updateGauge(4,+last[7],100);
 updateGauge(5,+last[8],5000);
 updateGauge(6,+last[9],120);

 /* GRAPH */
 let t=d.slice(-50);
 chart.data.labels=t.map(x=>x[0]);
 chart.data.datasets[0].data=t.map(x=>x[4]);
 chart.update();

 /* TABLE */
 let tb=document.getElementById("table");
 tb.innerHTML="";
 t.reverse().forEach(r=>{
  tb.innerHTML+=`<tr>${r.map(x=>`<td>${x}</td>`).join("")}</tr>`;
 });
}

/* CLICK GAUGE */
document.querySelectorAll(".glass").forEach(c=>{
 c.onclick=()=>page("an");
});

/* LOOP */
load();
setInterval(load,5000);

</script>

</body>
</html>
