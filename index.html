<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sensor Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1228;
  color: white;
}

.nav {
  display: flex;
  background: #151d3b;
}

.nav button {
  flex: 1;
  padding: 15px;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}

.nav button:hover {
  background: #1f2a52;
}

.page {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: #151d3b;
  border-radius: 16px;
  height: 250px;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th, .table td {
  padding: 8px;
  border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="showPage('realtime')">Realtime</button>
  <button onclick="showPage('graph')">Graph</button>
  <button onclick="showPage('table')">Data</button>
</div>

<!-- PAGE 1 -->
<div id="realtime" class="page active">
  <h2>Realtime Sensor</h2>
  <div class="grid">
    <div id="g1" class="card"></div>
    <div id="g2" class="card"></div>
    <div id="g3" class="card"></div>
    <div id="g4" class="card"></div>
    <div id="g5" class="card"></div>
    <div id="g6" class="card"></div>
  </div>
</div>

<!-- PAGE 2 -->
<div id="graph" class="page">
  <h2>Graph</h2>
  <div id="chart" style="height:400px;background:#151d3b;border-radius:16px;"></div>
</div>

<!-- PAGE 3 -->
<div id="table" class="page">
  <h2>Data Table</h2>
  <table class="table" id="dataTable"></table>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxafzEZXrZywZVvVc_9f9Xq6xK-AyORBFnUZL7HmGz6akXzCyTIUposMG2ARokrypOfCTpZcsXydfF/pub?gid=920439731&single=true&output=csv";

function showPage(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

function csvToJSON(csv){
  let lines = csv.split("\n");
  let headers = lines[0].split(",");
  let result = [];

  for(let i=1;i<lines.length;i++){
    let obj = {};
    let row = lines[i].split(",");
    headers.forEach((h,j)=> obj[h.trim()] = row[j]);
    result.push(obj);
  }
  return result;
}

fetch(URL)
.then(res => res.text())
.then(csv => {

  let data = csvToJSON(csv).filter(d => d["PM2.5"]);
  let latest = data[data.length-1];

  // ===== GAUGE =====
  function createGauge(id, name, val, max){
    let g = echarts.init(document.getElementById(id));
    g.setOption({
      series: [{
        type: 'gauge',
        min: 0,
        max: max,
        detail: { formatter: '{value}' },
        data: [{ value: val, name: name }]
      }]
    });
  }

  createGauge("g1","PM2.5", latest["PM2.5"], 200);
  createGauge("g2","Temp", latest["Temp"], 50);
  createGauge("g3","Humi", latest["Humi"], 100);
  createGauge("g4","CO2", latest["CO2"], 2000);
  createGauge("g5","Noise", latest["Noise"], 120);
  createGauge("g6","Lux", latest["Lux"], 2000);

  // ===== GRAPH =====
  let times = data.slice(-30).map(d => d.Time);
  let pm25 = data.slice(-30).map(d => parseFloat(d["PM2.5"]));
  let temp = data.slice(-30).map(d => parseFloat(d["Temp"]));

  let chart = echarts.init(document.getElementById('chart'));

  chart.setOption({
    legend: { textStyle:{color:'#fff'} },
    xAxis: { type:'category', data:times },
    yAxis: { type:'value' },
    series: [
      { name:"PM2.5", data:pm25, type:'line', smooth:true },
      { name:"Temp", data:temp, type:'line', smooth:true }
    ]
  });

  // ===== TABLE =====
  let table = document.getElementById("dataTable");

  let headers = Object.keys(data[0]);
  table.innerHTML = "<tr>"+headers.map(h=>`<th>${h}</th>`).join("")+"</tr>";

  data.slice(-50).reverse().forEach(r=>{
    table.innerHTML += "<tr>"+headers.map(h=>`<td>${r[h]}</td>`).join("")+"</tr>";
  });

});

// refresh ทุก 5 วิ
setInterval(()=>location.reload(),5000);

</script>

</body>
</html>
