<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Sensor Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1026;
  color: white;
}

/* NAV */
.nav {
  display: flex;
  background: #11193f;
}
.nav button {
  flex: 1;
  padding: 14px;
  border: none;
  background: none;
  color: white;
  cursor: pointer;
}

/* PAGE */
.page { display:none; padding:15px; }
.active { display:block; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: linear-gradient(145deg,#141c44,#0c1230);
  border-radius: 20px;
  height: 220px;
  box-shadow: 0 0 15px rgba(0,0,0,0.6);
  transition: 0.3s;
}

/* NEON GLOW */
.card.glow-green { box-shadow: 0 0 20px #00ffcc; }
.card.glow-yellow { box-shadow: 0 0 20px #ffcc00; }
.card.glow-red { box-shadow: 0 0 20px #ff3b3b; }

/* GRAPH */
.chart {
  width:100%;
  height:400px;
  background:#141c44;
  border-radius:16px;
}

/* TABLE */
.table {
  width:100%;
  border-collapse:collapse;
}
.table th,.table td{
  padding:6px;
  border-bottom:1px solid #333;
  font-size:12px;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="showPage('realtime')">Realtime</button>
  <button onclick="showPage('graph')">Graph</button>
  <button onclick="showPage('table')">Data</button>
</div>

<!-- REALTIME -->
<div id="realtime" class="page active">
  <div class="grid">
    <div id="g_pm25" class="card"></div>
    <div id="g_temp" class="card"></div>
    <div id="g_humi" class="card"></div>
    <div id="g_co2" class="card"></div>
    <div id="g_noise" class="card"></div>
    <div id="g_lux" class="card"></div>
  </div>
</div>

<!-- GRAPH -->
<div id="graph" class="page">
  <div id="chart" class="chart"></div>
</div>

<!-- TABLE -->
<div id="table" class="page">
  <table class="table" id="dataTable"></table>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTxafzEZXrZywZVvVc_9f9Xq6xK-AyORBFnUZL7HmGz6akXzCyTIUposMG2ARokrypOfCTpZcsXydfF/pub?gid=920439731&single=true&output=csv";

function showPage(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

function csvToJSON(csv){
  let lines = csv.split("\n");
  let headers = lines[0].split(",");
  let result = [];

  for(let i=1;i<lines.length;i++){
    let row = lines[i].split(",");
    if(row.length < headers.length) continue;

    let obj = {};
    headers.forEach((h,j)=> obj[h.trim()] = row[j]);
    result.push(obj);
  }
  return result;
}

/* COLOR LOGIC */
function getColor(v, max){
  let p = v/max;
  if(p < 0.5) return "green";
  if(p < 0.75) return "yellow";
  return "red";
}

/* GAUGE */
function createGauge(id, name, val, max){

  let chart = echarts.init(document.getElementById(id));

  let percent = val/max;

  chart.setOption({
    series: [{
      type: 'gauge',
      startAngle: 180,
      endAngle: 0,

      min: 0,
      max: max,

      progress: {
        show: true,
        width: 14
      },

      axisLine: {
        lineStyle: {
          width: 14,
          color: [
            [0.5, '#00ffcc'],
            [0.75, '#ffcc00'],
            [1, '#ff3b3b']
          ]
        }
      },

      pointer: { show:false },

      detail: {
        valueAnimation:true,
        fontSize:22,
        color: percent<0.5 ? "#00ffcc" : percent<0.75 ? "#ffcc00" : "#ff3b3b"
      },

      title: {
        offsetCenter:[0,"70%"],
        color:"#aaa"
      },

      data:[{ value: val, name:name }]
    }]
  });

  /* GLOW */
  let card = document.getElementById(id);
  card.classList.remove("glow-green","glow-yellow","glow-red");

  let c = getColor(val,max);
  card.classList.add("glow-"+c);
}

/* LOAD DATA */
function loadData(){
  fetch(URL)
  .then(res=>res.text())
  .then(csv=>{

    let data = csvToJSON(csv).filter(d=>d["PM2.5"]);
    let latest = data[data.length-1];

    createGauge("g_pm25","PM2.5",+latest["PM2.5"],200);
    createGauge("g_temp","Temp °C",+latest["Temp"],50);
    createGauge("g_humi","Humidity %",+latest["Humi"],100);
    createGauge("g_co2","CO2 ppm",+latest["CO2"],2000);
    createGauge("g_noise","Noise dB",+latest["Noise"],120);
    createGauge("g_lux","Lux",+latest["Lux"],2000);

    /* GRAPH */
    let times = data.slice(-50).map(d=>d.Time);
    let pm25 = data.slice(-50).map(d=>+d["PM2.5"]);

    let chart = echarts.init(document.getElementById('chart'));

    chart.setOption({
      tooltip:{ trigger:'axis' },
      xAxis:{ type:'category', data:times },
      yAxis:{ type:'value' },
      dataZoom:[
        { type:'inside' },
        { type:'slider' }
      ],
      series:[{
        data:pm25,
        type:'line',
        smooth:true,
        areaStyle:{ opacity:0.2 }
      }]
    });

  });
}

/* CLICK GAUGE → GRAPH */
document.querySelectorAll(".card").forEach(c=>{
  c.addEventListener("click",()=>{
    showPage("graph");
  });
});

/* RUN */
loadData();
setInterval(loadData,5000);

/* RESIZE */
window.addEventListener('resize', ()=>{
  document.querySelectorAll('.card').forEach(c=>{
    let chart = echarts.getInstanceByDom(c);
    if(chart) chart.resize();
  });
});

</script>

</body>
</html>
