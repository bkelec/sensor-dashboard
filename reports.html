<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Environmental Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --card: rgba(15, 23, 42, 0.8); --text: #f8fafc; --muted: #94a3b8; }
        [data-theme="light"] { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b; }
        body { background: var(--bg); color: var(--text); font-family: 'Kanit', sans-serif; transition: 0.3s; }
        .glass { background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <a href="index.html" class="text-blue-500 text-sm hover:underline flex items-center gap-2 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back to Dashboard
                </a>
                <h1 class="text-3xl font-bold">สรุปรายงานข้อมูล</h1>
            </div>
            <button onclick="window.print()" class="bg-blue-600 px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-500">พิมพ์รายงาน</button>
        </header>

        <div class="grid gap-6">
            <div class="glass p-6">
                <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-widest mb-4">Summary (Last 24 Hours)</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="p-4 bg-black/20 rounded-xl">
                        <p class="text-[10px] opacity-50 uppercase">Avg PM 2.5</p>
                        <p id="avg-pm" class="text-2xl font-bold text-orange-400">--</p>
                    </div>
                    <div class="p-4 bg-black/20 rounded-xl">
                        <p class="text-[10px] opacity-50 uppercase">Max Temp</p>
                        <p id="max-temp" class="text-2xl font-bold text-blue-400">--</p>
                    </div>
                    <div class="p-4 bg-black/20 rounded-xl">
                        <p class="text-[10px] opacity-50 uppercase">Max Noise</p>
                        <p id="max-noise" class="text-2xl font-bold text-pink-400">--</p>
                    </div>
                    <div class="p-4 bg-black/20 rounded-xl">
                        <p class="text-[10px] opacity-50 uppercase">Data Points</p>
                        <p id="count" class="text-2xl font-bold text-emerald-400">--</p>
                    </div>
                </div>
            </div>

            <div class="glass overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="bg-black/40 text-[10px] uppercase text-muted">
                            <th class="p-4">Timestamp</th>
                            <th class="p-4">PM2.5</th>
                            <th class="p-4">CO2</th>
                            <th class="p-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-white/5">
                        <!-- Data will load here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const theme = localStorage.getItem('theme') || 'dark';
        if(theme === 'light') document.body.setAttribute('data-theme', 'light');

        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTxafzEZXrZywZVvVc_9f9Xq6xK-AyORBFnUZL7HmGz6akXzCyTIUposMG2ARokrypOfCTpZcsXydfF/pub?gid=920439731&single=true&output=csv';
        
        async function loadReport() {
            const res = await fetch(csvUrl);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(',')).slice(1).filter(r => r.length > 5);
            const recent = rows.slice(-50).reverse();

            // Stats
            const pms = rows.map(r => parseFloat(r[4]) || 0);
            const temps = rows.map(r => parseFloat(r[6]) || 0);
            const noises = rows.map(r => parseFloat(r[9]) || 0);

            document.getElementById('avg-pm').innerText = (pms.reduce((a,b)=>a+b,0)/pms.length).toFixed(1);
            document.getElementById('max-temp').innerText = Math.max(...temps).toFixed(1) + '°C';
            document.getElementById('max-noise').innerText = Math.max(...noises).toFixed(1) + 'dB';
            document.getElementById('count').innerText = rows.length;

            document.getElementById('table-body').innerHTML = recent.map(r => `
                <tr>
                    <td class="p-4 opacity-50 font-mono text-[11px]">${r[0]}</td>
                    <td class="p-4 font-bold text-orange-400">${r[4]}</td>
                    <td class="p-4 font-bold text-emerald-400">${r[10]}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 rounded-full text-[10px] ${r[4] > 50 ? 'bg-red-500/20 text-red-400' : 'bg-emerald-500/20 text-emerald-400'}">
                            ${r[4] > 50 ? 'Warning' : 'Normal'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }
        loadReport();
    </script>
</body>
</html>
